version: "3.8"

services:
  ipfs:
    image: ipfs/kubo:latest
    container_name: gotong-ledger-ipfs
    restart: unless-stopped
    ports:
      - "5001:5001"  # API
      - "8080:8080"  # Gateway
    volumes:
      - ipfs_data:/data/ipfs
    environment:
      - IPFS_PROFILE=server
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: gotong-ledger-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gotong
      POSTGRES_PASSWORD: gotong123
      POSTGRES_DB: gotongledger
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gotong -d gotongledger"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ipfs_data:
  postgres_data:
